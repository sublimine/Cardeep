# Cardeep extraction recipe — CDP-ES-00-EMRH0TWQ
# Reusable; re-scrape without raw crude.
version: 1
source: wallapop.com
scope: platform-wholesale (api.wallapop.com /api/v3/search/section app JSON API)
engine: curl_cffi+chrome131_impersonate+json_api(GET)+jwt_pagination
access: FREE: public mobile-app JSON API answers a Chrome TLS fingerprint cold (no proxy, no browser, no cookie warm-up, no JS challenge). is_tier1=TRUE (giant Tier-1 brand) but defense_tier=t1_soft (API host unwalled to curl_cffi). No auth bearer for public search.
data_surface: app_api
surface_intent: json_api
endpoints:
  search: GET https://api.wallapop.com/api/v3/search/section
  seller: GET https://api.wallapop.com/api/v3/users/{user_id}
request:
  search_params: keywords=<term>&source=deep_link&category_id=100&search_id=<uuid>&latitude=<lat>&longitude=<lon>&order_by=most_relevance&section_type=organic_search_results
  headers: accept json; accept-language es; deviceos/x-deviceos=0; x-appversion; x-deviceid=<uuid per session>; mpid/trackinguserid=stable; referer/origin es.wallapop.com; sec-ch-ua-platform Windows
  pagination: opaque next_page JWT in meta.next_page replayed as &next_page=<jwt>, ~40/page
enumeration: keyword sweep (~40 car brands) x ES geo-centroid grid (lat/long HONORED); each (keyword,centroid) paged by the meta.next_page JWT until the chain ends; dedup by item id across the whole run
platform_entity: kind=plataforma, province_code=NULL (sentinel 00 in cdp_code only), is_tier1=TRUE, defense_tier=t1_soft, source_group=marketplace_generalist, role=platform, data_surface=app_api
attribution: per-item user_id -> GET /users/{id} (cached per run): type 'professional' -> compraventa DEALER; type 'normal' -> PER-SELLER 'particular' entity (cdp particular:wallapop:{user_id}; one human=one entity, sells_cars=TRUE; car+edge+delta caged identically to a dealer)
dual_membership: vehicle.entity_ulid=SELLING DEALER/particular; platform_listing edge=platform<->vehicle
geo: dealer province from user.location.zip[:2] (INE) -> item region2/city via GeoResolver -> item lat/long via ProvinceGeocoder (first hit wins)
field_map:
  listing_ref: item.id (wallapop native listing id)
  deep_link: https://es.wallapop.com/item/ + item.web_slug
  make: item.type_attributes.brand
  model: item.type_attributes.model
  year: item.type_attributes.year
  km: item.type_attributes.km
  version: item.type_attributes.version
  price: item.price.amount (EUR)
  fuel: item.type_attributes.engine (label)
  photo_url: item.images[0].urls.big|medium|small
  location: item.location {region2, city, latitude, longitude, postal_code}
  seller: users/{user_id} {type, web_slug, micro_name, featured, location.zip/city}
